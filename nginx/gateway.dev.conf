upstream auth_service {
    server auth-service:5001;
}

upstream budget_service {
    server budget-service:5000;
}

# Vite dev server runs on 5173 in development
upstream frontend_app {
    server frontend:5173;
}

server {
    listen 80;

    # Auth routes — must come before /api/ to match first
    location /api/auth/ {
        proxy_pass         http://auth_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other API routes → budget-service
    location /api/ {
        proxy_pass         http://budget_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Serve the React SPA — includes WebSocket forwarding for Vite HMR
    location / {
        proxy_pass             http://frontend_app;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
    }
}
